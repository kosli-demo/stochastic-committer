# Both matrix jobs are designed to avoid hitting GitHub's 256-job matrix limit:
#
# create-new-repos fans out only over repos that do not yet exist on GitHub.
# On most runs all repos are already present, so the matrix is empty and the
# job is skipped entirely.
#
# simulate-commits-to-selected-repos fans out only over repos that were randomly
# selected for a commit this run (typically a small fraction of N). Fanning out
# over all N repos regardless of selection would waste jobs and, with a large
# enough N, could hit the limit.

name: Simulate commits on many repos

on:
  workflow_call:
    inputs:
      scope:
        description: 'Where to attest to'
        type: string
        required: false
        default: both
      repo_count:
        description: 'Number of demo repos to select'
        type: number
        required: false
        default: 200
      repo_chance:
        description: '% chance each repo will get a commit+push'
        type: number
        required: false
        default: 5
    secrets:
      CLONE_PUSH_REPOS:
        required: true
      KOSLI_API_TOKEN_STAGING:
        required: true
      KOSLI_API_TOKEN_PROD:
        required: true

  workflow_dispatch:
    inputs:
      scope:
        description: 'Where to attest to'
        type: choice
        required: true
        options:
          - staging
          - prod
          - both
      repo_count:
        description: 'Number of demo repos to select'
        required: false
        default: 30
      repo_chance:
        description: '% chance each repo will get a commit+push'
        required: false
        default: 10

env:
  KOSLI_ORG: ${{ vars.KOSLI_ORG }}
  KOSLI_DEBUG: ${{ vars.KOSLI_DEBUG }}
  KOSLI_DRY_RUN: ${{ vars.KOSLI_DRY_RUN }}
  REPO_COUNT: ${{ inputs.repo_count }}
  REPO_CHANCE: ${{ inputs.repo_chance }}


jobs:
  select-n-repos:
    needs: []
    runs-on: ubuntu-latest
    outputs:
      n_repos: ${{ steps.set-repos.outputs.n_repos }}
      selected_repos: ${{ steps.set-repos.outputs.selected_repos }}
      non_existent_repos: ${{ steps.set-repos.outputs.non_existent_repos }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v6

      - name: Select repo names
        id: set-repos
        env:
          GH_TOKEN: ${{ secrets.CLONE_PUSH_REPOS }}
        run: |
          URL=https://raw.githubusercontent.com/kosli-demo/base/refs/heads/main/data/all-repos.json
          curl --fail --output all_repos.json --silent "${URL}"
          ./bin/select_repos.py all_repos.json ${REPO_COUNT} ${REPO_CHANCE} > n_repos.json
          N_REPOS="$(jq --compact-output . n_repos.json)"
          SELECTED_REPOS="$(jq --compact-output '[.[] | select(.selected == true)]' n_repos.json)"

          # Must set non-existent-repos from n_repos.json (all N repos), not SELECTED_REPOS.
          # The simulate-deployments-from-selected-repos job snapshots all N repos, so all
          # N repos must exist before it runs -- not just the ones selected for a commit.
          NON_EXISTENT_REPOS="$(jq --compact-output '[.[] | select(.exists == false)]' n_repos.json)"
          
          echo "n_repos=${N_REPOS}" >> ${GITHUB_OUTPUT}
          echo "selected_repos=${SELECTED_REPOS}" >> ${GITHUB_OUTPUT}
          echo "non_existent_repos=${NON_EXISTENT_REPOS}" >> ${GITHUB_OUTPUT}


  create-new-repos:
    needs: [select-n-repos]
    if: ${{ needs.select-n-repos.outputs.non_existent_repos != '[]' }}
    strategy:
      # Limit concurrency to avoid hitting GitHub API secondary rate limits
      # when a large jump in repo_count causes many repos to be created at once.
      max-parallel: 5
      matrix:
        include: ${{ fromJSON(needs.select-n-repos.outputs.non_existent_repos) }}
    uses: ./.github/workflows/create-new-repo.yml
    with:
      repo_name: ${{ matrix.repo_name }}
    secrets:
      CLONE_PUSH_REPOS: ${{ secrets.CLONE_PUSH_REPOS }}


  # mark-new-repos-as-existing keeps the exists field in all-repos.json accurate
  # by flipping exists to true for any repo that was just created. This caching
  # avoids two problems that arose when select_repos.py checked existence via the
  # GitHub API on every run: (1) rate limiting at high repo counts, and (2) ~100s
  # of sequential HTTPS calls to check 500 repos one by one.
  mark-new-repos-as-existing:
    needs: [select-n-repos, create-new-repos]
    if: ${{ !failure() && !cancelled() && needs.select-n-repos.outputs.non_existent_repos != '[]' }}
    runs-on: ubuntu-latest
    env:
      NON_EXISTENT_REPOS: ${{ needs.select-n-repos.outputs.non_existent_repos }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Configure git
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.event.sender.login }}@users.noreply.github.com"

      - uses: actions/checkout@v6
        with:
          repository: kosli-demo/base
          token: ${{ secrets.CLONE_PUSH_REPOS }}

      - name: Mark newly created repos as existing in all-repos.json
        run: |
          echo "${NON_EXISTENT_REPOS}" | jq --raw-output '.[].repo_name' | while read -r REPO_NAME; do
            jq --arg name "${REPO_NAME}" \
              '(.[] | select(.repo_name == $name) | .exists) |= true' \
              data/all-repos.json > tmp.json
            mv tmp.json data/all-repos.json
          done

      - name: Commit and push
        run: |
          git add data/all-repos.json
          git commit --message "Mark newly created repos as existing"
          git push


  simulate-commits-to-selected-repos:
    needs: [select-n-repos, create-new-repos, mark-new-repos-as-existing]
    # !failure() && !cancelled() is required because create-new-repos is skipped when all
    # repos already exist. GitHub would otherwise propagate that skip to this job, preventing
    # commits even when repos are selected. This condition lets the job run as long as nothing
    # has actually failed or been cancelled.
    if: ${{ !failure() && !cancelled() && needs.select-n-repos.outputs.selected_repos != '[]' }}
    strategy:
      matrix:
        include: ${{ fromJSON(needs.select-n-repos.outputs.selected_repos) }}
    uses: ./.github/workflows/commit-to-repo-and-run-ci.yml
    with:
      scope: ${{ inputs.scope }}
      repo_name: ${{ matrix.repo_name }}
    secrets:
      CLONE_PUSH_REPOS: ${{ secrets.CLONE_PUSH_REPOS }}
      KOSLI_API_TOKEN_STAGING: ${{ secrets.KOSLI_API_TOKEN_STAGING }}
      KOSLI_API_TOKEN_PROD: ${{ secrets.KOSLI_API_TOKEN_PROD }}


  simulate-deployments-from-selected-repos:
    needs: [select-n-repos, simulate-commits-to-selected-repos]
    # !failure() && !cancelled() is required for the same reason as on
    # simulate-commits-to-selected-repos: GitHub propagates skips transitively,
    # so the skip of create-new-repos would otherwise reach this job too.
    if: ${{ !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    env:
      N_REPOS: ${{ needs.select-n-repos.outputs.n_repos }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Setup Kosli CLI
        uses: kosli-dev/setup-cli-action@v3
        with:
          version: ${{ vars.KOSLI_CLI_VERSION }}

      - name: Create N files ready for kosli snapshot paths
        # curl hits raw.githubusercontent.com which is a CDN serving static files.
        # Unlike the GitHub REST API it has no per-token rate limits, so fetching
        # hundreds of files sequentially is not a concern.
        run: |
          echo "${N_REPOS}" | jq --compact-output '.[]' | while read -r entry; do
            REPO_NAME="$(echo "${entry}" | jq --raw-output '.repo_name')"
            github=https://raw.githubusercontent.com
            URL="${github}/kosli-demo/${REPO_NAME}/refs/heads/main/source/datetime.txt"
            curl --fail --output "${REPO_NAME}.txt" --show-error --silent "${URL}"
            TIMESTAMP="$(cut -d' ' -f2 "${REPO_NAME}.txt")"
            touch -d "@${TIMESTAMP}" "${REPO_NAME}.txt"
          done

      - name: Create a Kosli --paths-file for N files
        run: |
          {
            echo "version: 1"
            echo "artifacts:"
            echo "${N_REPOS}" | jq --compact-output '.[]' | while read -r entry; do
              REPO_NAME="$(echo "${entry}" | jq --raw-output '.repo_name')"
              echo "  ${REPO_NAME}:"
              echo "    path: ${REPO_NAME}.txt"
            done
          } > paths.yml

      - name: Kosli snapshot paths to staging
        if: ${{ inputs.scope == 'staging' || inputs.scope == 'both' }}
        env:
          KOSLI_HOST: https://staging.app.kosli.com
          KOSLI_API_TOKEN: ${{ secrets.KOSLI_API_TOKEN_STAGING }}
        run:
          kosli snapshot paths staging
            --paths-file paths.yml

      - name: Kosli snapshot paths to prod
        if: ${{ inputs.scope == 'prod' || inputs.scope == 'both' }}
        env:
          KOSLI_HOST: https://app.kosli.com
          KOSLI_API_TOKEN: ${{ secrets.KOSLI_API_TOKEN_PROD }}
        run:
          kosli snapshot paths staging
            --paths-file paths.yml

name: Commit to repo and run CI

on:
  workflow_call:
    inputs:
      scope:
        type: string
        required: true
      repo_name:
        type: string
        required: true
    secrets:
      CLONE_PUSH_REPOS:
        required: true
      KOSLI_API_TOKEN_STAGING:
        required: false
      KOSLI_API_TOKEN_PROD:
        required: false

jobs:
  commit-to-repo:
    uses: ./.github/workflows/commit-to-repo.yml
    with:
      repo_name: ${{ inputs.repo_name }}
    secrets:
      CLONE_PUSH_REPOS: ${{ secrets.CLONE_PUSH_REPOS }}

  run-ci:
    needs: [commit-to-repo]
    runs-on: ubuntu-latest
    env:
      REPO_NAME: ${{ inputs.repo_name }}
      GH_TOKEN: ${{ secrets.CLONE_PUSH_REPOS }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Wait for repo workflow to be available
        run: |
          for i in $(seq 1 10); do
            if gh workflow view main.yml --repo "kosli-demo/${REPO_NAME}" > /dev/null 2>&1; then
              break
            fi
            echo "Waiting for workflow to be available (attempt ${i}/10)..."
            sleep 10
            if [ "${i}" -eq 10 ]; then
              echo "Workflow main.yml not found in kosli-demo/${REPO_NAME} after 10 attempts"
              exit 1
            fi
          done

      - name: Run CI workflow
        run: |
          # Setup where triggered workflow will attest to
          case "${{ inputs.scope }}" in
            staging)
              KOSLI_HOST="https://staging.app.kosli.com"
              KOSLI_API_TOKEN="${{ secrets.KOSLI_API_TOKEN_STAGING }}"
              ;;
            prod)
              KOSLI_HOST="https://app.kosli.com"
              KOSLI_API_TOKEN="${{ secrets.KOSLI_API_TOKEN_PROD }}"
              ;;
            both)
              KOSLI_HOST="https://app.kosli.com,https://staging.app.kosli.com"
              KOSLI_API_TOKEN="${{ secrets.KOSLI_API_TOKEN_PROD }},${{ secrets.KOSLI_API_TOKEN_STAGING }}"
              ;;
          esac

          BEFORE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          # Trigger the workflow, telling it where to attest to
          gh workflow run main.yml \
            --repo "kosli-demo/${REPO_NAME}" \
            --ref main \
            --field kosli_host="${KOSLI_HOST}" \
            --field kosli_api_token="${KOSLI_API_TOKEN}"

          # Get id of workflow run
          for i in $(seq 1 12); do
            RUN_ID=$(gh run list \
              --repo "kosli-demo/${REPO_NAME}" \
              --workflow main.yml \
              --created ">=${BEFORE}" \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId // empty')
            if [ -n "${RUN_ID}" ]; then
              break
            fi
            echo "Waiting for run to appear (attempt ${i}/12)..."
            sleep 5
            if [ "${i}" -eq 12 ]; then
              echo "Run not found after 60 seconds"
              exit 1
            fi
          done

          # Wait for workflow run to finish
          gh run watch "${RUN_ID}" \
            --repo "kosli-demo/${REPO_NAME}" \
            --exit-status

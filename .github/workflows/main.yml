name: Main

on:
  push:
    branches:
      - main
  #schedule: 
  #  - cron: '* * * * *' # Max, every 5 minutes

env:
  KOSLI_API_TOKEN: ${{ secrets.KOSLI_API_TOKEN }}
  KOSLI_DEBUG:     false
  KOSLI_DRY_RUN:   false
  KOSLI_HOST:      https://staging.app.kosli.com
  KOSLI_ORG:       kosli-demo
  KOSLI_FLOW:      ${{ github.event.repository.name }}-ci
  KOSLI_TRAIL:     ${{ github.sha}}

jobs:
  setup:
    needs: []
    if: ${{ github.event.repository.name != 'spreader' }}
    runs-on: ubuntu-latest
    outputs:
      repo_names: ${{ steps.set-repo-names.outputs.repo_names }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v6

      - name: Setup Kosli CLI
        uses: kosli-dev/setup-cli-action@v2
        with:
          version: ${{ vars.KOSLI_CLI_VERSION }}

      - name: Create Kosli Flow
        run:
          kosli create flow "${KOSLI_FLOW}"

      - name: Begin Kosli Trail
        run:
          kosli begin trail "${KOSLI_TRAIL}"

      - name: Write Trail URL to GitHub Step Summary
        run: |
          url="${KOSLI_HOST}/${KOSLI_ORG}/flows/${KOSLI_FLOW}/trails/${KOSLI_TRAIL}"
          echo "[Kosli Trail](${url})" > "${GITHUB_STEP_SUMMARY}"

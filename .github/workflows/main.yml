name: Simulate commits on many repos

on:
  workflow_dispatch:
    inputs:
      scope:
        description: 'Where to attest to'
        type: choice
        required: true
        options:
          - staging
          - prod
          - both
      repo_count:
        description: 'Number of demo repos to select'
        required: false
        default: 5
      repo_chance:
        description: '% chance each repo will get a commit+push'
        required: false
        default: 50

  #schedule: 
  #  - cron: '* * * * *'   # Every 5 minutes (max)
  #  - cron: '* 10 * * *'  # Every 10 minutes

env:
  KOSLI_ORG: ${{ vars.KOSLI_ORG }}
  KOSLI_DEBUG: ${{ vars.KOSLI_DEBUG }}
  KOSLI_DRY_RUN: ${{ vars.KOSLI_DRY_RUN }}
  REPO_COUNT: ${{ inputs.repo_count }}
  REPO_CHANCE: ${{ inputs.repo_chance }}


jobs:
  set-n-repos:
    needs: []
    runs-on: ubuntu-latest
    outputs:
      date_time: ${{ steps.set-repos.outputs.date_time }}
      n_repos: ${{ steps.set-repos.outputs.n_repos }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v6

      - name: Select repo names
        id: set-repos
        run: |
          DATE_TIME="$(date +%Y-%m-%dT%H.%M.%S)"
          echo "date_time=${DATE_TIME}" >> ${GITHUB_OUTPUT}

          URL=https://raw.githubusercontent.com/kosli-demo/base/refs/heads/main/data/all-repos.json
          curl --fail --output all_repos.json --silent "${URL}"

          ./bin/select_repos.py all_repos.json ${REPO_COUNT} ${REPO_CHANCE} > n_repos.json
          N_REPOS="$(jq --compact-output . n_repos.json)"
          echo "n_repos=${N_REPOS}" >> ${GITHUB_OUTPUT}


  commit-to-n-repos:
    needs: [set-n-repos]
    if: ${{ needs.set-n-repos.outputs.n_repos != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include: ${{ fromJSON(needs.set-n-repos.outputs.n_repos) }}
    env:
      DATE_TIME: ${{ needs.set-n-repos.outputs.date_time }}
      REPO_NAME: ${{ matrix.repo_name }}
      GH_TOKEN: ${{ secrets.CLONE_PUSH_REPOS }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Configure git
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.event.sender.login }}@users.noreply.github.com"
                  
      - name: Create or commit to repo
        run: |
          if ! gh repo view "kosli-demo/${REPO_NAME}" > /dev/null 2>&1; then
            echo "${REPO_NAME} does not exist"
            gh repo create "kosli-demo/${REPO_NAME}" --public
            for i in $(seq 1 10); do
              if gh repo view "kosli-demo/${REPO_NAME}" > /dev/null 2>&1; then
                break
              fi
              echo "Waiting for repo to be available (attempt ${i}/10)..."
              sleep 10
              if [ "${i}" -eq 10 ]; then
                echo "Repo kosli-demo/${REPO_NAME} not available after 10 attempts"
                exit 1
              fi
            done
            gh repo clone "kosli-demo/base" base-source
            cp -r base-source/. "${REPO_NAME}-init/"
            cd "${REPO_NAME}-init"
            rm -rf .git
            git init --initial-branch main
            git add .
            git commit --message "Initial commit"
            git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/kosli-demo/${REPO_NAME}.git"
            git push --set-upstream origin main
          else
            echo "${REPO_NAME} exists"
            gh repo clone "kosli-demo/${REPO_NAME}"
            mv "${REPO_NAME}"/.git /tmp
            gh repo clone kosli-demo/base
            cd base
            rm -rf .git
            mv /tmp/.git .
            echo "${REPO_NAME} ${DATE_TIME}" > ./source/datetime.txt
            git add .
            git commit --message "Simulated commit ${DATE_TIME}"
            git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/kosli-demo/${REPO_NAME}.git"
            git push
          fi

      - name: Wait for workflow to be available
        run: |
          for i in $(seq 1 10); do
            if gh workflow view main.yml --repo "kosli-demo/${REPO_NAME}" > /dev/null 2>&1; then
              break
            fi
            echo "Waiting for workflow to be available (attempt ${i}/10)..."
            sleep 10
            if [ "${i}" -eq 10 ]; then
              echo "Workflow main.yml not found in kosli-demo/${REPO_NAME} after 10 attempts"
              exit 1
            fi
          done

      - name: Trigger CI workflow in target repo, kosli attest to staging
        if: ${{ inputs.scope == 'staging' || inputs.scope == 'both' }}
        env:
          KOSLI_HOST: https://staging.app.kosli.com
          KOSLI_API_TOKEN: ${{ secrets.KOSLI_API_TOKEN_STAGING }}
        run: |
          BEFORE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          
          gh workflow run main.yml \
            --repo "kosli-demo/${REPO_NAME}" \
            --ref main \
            --field kosli_host="${KOSLI_HOST}" \
            --field kosli_api_token="${KOSLI_API_TOKEN}"

          for i in $(seq 1 12); do
            RUN_ID=$(gh run list \
              --repo "kosli-demo/${REPO_NAME}" \
              --workflow main.yml \
              --created ">=${BEFORE}" \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId // empty')
            if [ -n "${RUN_ID}" ]; then
              break
            fi
            echo "Waiting for run to appear (attempt ${i}/12)..."
            sleep 5
            if [ "${i}" -eq 12 ]; then
              echo "Run not found after 60 seconds"
              exit 1
            fi
          done

          gh run watch "${RUN_ID}" \
            --repo "kosli-demo/${REPO_NAME}" \
            --exit-status

      - name: Trigger CI workflow in target repo, kosli attest to prod
        if: ${{ inputs.scope == 'prod' || inputs.scope == 'both' }}
        env:
          KOSLI_HOST: https://app.kosli.com
          KOSLI_API_TOKEN: ${{ secrets.KOSLI_API_TOKEN_PROD }}
        run: |
          BEFORE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          gh workflow run main.yml \
            --repo "kosli-demo/${REPO_NAME}" \
            --ref main \
            --field kosli_host="${KOSLI_HOST}" \
            --field kosli_api_token="${KOSLI_API_TOKEN}"
          
          for i in $(seq 1 12); do
            RUN_ID=$(gh run list \
              --repo "kosli-demo/${REPO_NAME}" \
              --workflow main.yml \
              --created ">=${BEFORE}" \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId // empty')
            if [ -n "${RUN_ID}" ]; then
              break
            fi
            echo "Waiting for run to appear (attempt ${i}/12)..."
            sleep 5
            if [ "${i}" -eq 12 ]; then
              echo "Run not found after 60 seconds"
              exit 1
            fi
          done

          gh run watch "${RUN_ID}" \
            --repo "kosli-demo/${REPO_NAME}" \
            --exit-status


  simulate-deployments:
    needs: [set-n-repos, commit-to-n-repos]
    runs-on: ubuntu-latest
    env:
      DATE_TIME: ${{ needs.set-n-repos.outputs.date_time }}
      N_REPOS: ${{ needs.set-n-repos.outputs.n_repos }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      # TODO: A current limitation is that if repo_count==15 (say)
      # then the new snapshot will always create 15 new artifacts.
      # If repo_chance < 100% and some repos (3 say) are not selected, 
      # we need those 3 to be the SAME as they were in the previous snapshot.
      # Viz, the new snapshot would contains 12 new artifacts. This will
      # allow a tuple such as (repo_count=250, repo_count=2) which will
      # nicely simulate a sequence of changes from different repos.
      # HOW?
      # Update set-n-repos so it outputs all repo_count repo-names, and
      # each entry has an added selected: true/false value.
      # Then in the loop below, if the selected value is false, 
      # we curl the latest .txt from that repo. This will result in
      # a lot of curls for the (250,2) tuple above. 
      # IDEA
      # The master JSON array of repo-names could be tweaked so that
      # specific repos are more likely to be selected. This could be 
      # useful if we want to "shape" the data to give a better demo.

      - name: Setup Kosli CLI
        uses: kosli-dev/setup-cli-action@v3
        with:
          version: ${{ vars.KOSLI_CLI_VERSION }}

      - name: Create N files ready for kosli snapshot paths
        run: |
          echo "${N_REPOS}" | jq --compact-output '.[]' | while read -r entry; do
            repo_name="$(echo "${entry}" | jq --raw-output '.repo_name')"
            selected="$(echo "${entry}" | jq --raw-output '.selected')"
            if [ "${selected}" = "true" ]; then
              echo "${repo_name} ${DATE_TIME}" > "${repo_name}.txt"
            else
              curl --fail --output "${repo_name}.txt" --silent \
                "https://raw.githubusercontent.com/kosli-demo/${repo_name}/refs/heads/main/source/datetime.txt"
            fi
          done

      - name: Create a Kosli paths file
        run: |
          {
            echo "version: 1"
            echo "artifacts:"
            echo "${N_REPOS}" | jq --compact-output '.[]' | while read -r entry; do
              repo_name="$(echo "${entry}" | jq --raw-output '.repo_name')"
              echo "  ${repo_name}:"
              echo "    path: ${repo_name}.txt"
            done
          } > paths.yml

      - name: Kosli snapshot paths to staging
        if: ${{ inputs.scope == 'staging' || inputs.scope == 'both' }}
        env:
          KOSLI_HOST: https://staging.app.kosli.com
          KOSLI_API_TOKEN: ${{ secrets.KOSLI_API_TOKEN_STAGING }}
        run:
          kosli snapshot paths staging
            --paths-file paths.yml

      - name: Kosli snapshot paths to prod
        if: ${{ inputs.scope == 'prod' || inputs.scope == 'both' }}
        env:
          KOSLI_HOST: https://app.kosli.com
          KOSLI_API_TOKEN: ${{ secrets.KOSLI_API_TOKEN_PROD }}
        run:
          kosli snapshot paths staging
            --paths-file paths.yml




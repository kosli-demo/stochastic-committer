name: Simulate commits on many repos

on:
  workflow_dispatch:
    inputs:
      scope:
        description: 'Where to attest to'
        type: choice
        required: true
        options:
          - staging
          - prod
          - both
      repo_count:
        description: 'Number of demo repos to select'
        required: false
        default: 5
      repo_chance:
        description: '% chance each repo will get a commit+push'
        required: false
        default: 50

  #schedule: 
  #  - cron: '* * * * *'   # Every 5 minutes (max)
  #  - cron: '* 10 * * *'  # Every 10 minutes

env:
  KOSLI_ORG: ${{ vars.KOSLI_ORG }}
  KOSLI_DEBUG: ${{ vars.KOSLI_DEBUG }}
  KOSLI_DRY_RUN: ${{ vars.KOSLI_DRY_RUN }}
  REPO_COUNT: ${{ inputs.repo_count }}
  REPO_CHANCE: ${{ inputs.repo_chance }}


jobs:
  select-n-repos:
    needs: []
    runs-on: ubuntu-latest
    outputs:
      n_repos: ${{ steps.set-repos.outputs.n_repos }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v6

      - name: Select repo names
        id: set-repos
        run: |
          URL=https://raw.githubusercontent.com/kosli-demo/base/refs/heads/main/data/all-repos.json
          curl --fail --output all_repos.json --silent "${URL}"
          ./bin/select_repos.py all_repos.json ${REPO_COUNT} ${REPO_CHANCE} > n_repos.json
          N_REPOS="$(jq --compact-output . n_repos.json)"
          echo "n_repos=${N_REPOS}" >> ${GITHUB_OUTPUT}


  commit-to-some-repos:
    needs: [select-n-repos]
    if: ${{ needs.select-n-repos.outputs.n_repos != '[]' }}
    strategy:
      matrix:
        include: ${{ fromJSON(needs.select-n-repos.outputs.n_repos) }}
    uses: ./.github/workflows/commit-to-repo-if-selected.yml
    with:
      scope: ${{ inputs.scope }}
      repo_name: ${{ matrix.repo_name }}
      selected: ${{ matrix.selected }}
    secrets:
      CLONE_PUSH_REPOS: ${{ secrets.CLONE_PUSH_REPOS }}
      KOSLI_API_TOKEN_STAGING: ${{ secrets.KOSLI_API_TOKEN_STAGING }}
      KOSLI_API_TOKEN_PROD: ${{ secrets.KOSLI_API_TOKEN_PROD }}


  simulate-some-deployments:
    needs: [select-n-repos, commit-to-some-repos]
    runs-on: ubuntu-latest
    env:
      N_REPOS: ${{ needs.select-n-repos.outputs.n_repos }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Setup Kosli CLI
        uses: kosli-dev/setup-cli-action@v3
        with:
          version: ${{ vars.KOSLI_CLI_VERSION }}

      - name: Create N files ready for kosli snapshot paths
        run: |
          echo "${N_REPOS}" | jq --compact-output '.[]' | while read -r entry; do
            REPO_NAME="$(echo "${entry}" | jq --raw-output '.repo_name')"
            github=https://raw.githubusercontent.com
            URL="${github}/kosli-demo/${REPO_NAME}/refs/heads/main/source/datetime.txt"
            curl --fail --output "${REPO_NAME}.txt" --silent "${URL}"
            TIMESTAMP="$(cut -d' ' -f2 "${REPO_NAME}.txt")"
            touch -d "@${TIMESTAMP}" "${REPO_NAME}.txt"
          done

      - name: Create a Kosli --paths-file for N files
        run: |
          {
            echo "version: 1"
            echo "artifacts:"
            echo "${N_REPOS}" | jq --compact-output '.[]' | while read -r entry; do
              REPO_NAME="$(echo "${entry}" | jq --raw-output '.repo_name')"
              echo "  ${REPO_NAME}:"
              echo "    path: ${REPO_NAME}.txt"
            done
          } > paths.yml

      - name: Kosli snapshot paths to staging
        if: ${{ inputs.scope == 'staging' || inputs.scope == 'both' }}
        env:
          KOSLI_HOST: https://staging.app.kosli.com
          KOSLI_API_TOKEN: ${{ secrets.KOSLI_API_TOKEN_STAGING }}
        run:
          kosli snapshot paths staging
            --paths-file paths.yml

      - name: Kosli snapshot paths to prod
        if: ${{ inputs.scope == 'prod' || inputs.scope == 'both' }}
        env:
          KOSLI_HOST: https://app.kosli.com
          KOSLI_API_TOKEN: ${{ secrets.KOSLI_API_TOKEN_PROD }}
        run:
          kosli snapshot paths staging
            --paths-file paths.yml

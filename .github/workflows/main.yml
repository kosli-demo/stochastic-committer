name: Main

on:
  push:
    branches:
      - main
  #schedule: 
  #  - cron: '* * * * *' # Max, every 5 minutes

env:
  #KOSLI_API_TOKEN: ${{ secrets.KOSLI_API_TOKEN }}
  KOSLI_DEBUG:     false
  KOSLI_DRY_RUN:   false
  KOSLI_HOST:      https://staging.app.kosli.com
  KOSLI_ORG:       kosli-demo
  REPO_NAME:       ${{ github.event.repository.name }}
jobs:
  set-repo-names:
    needs: []
    runs-on: ubuntu-latest
    outputs:
      repo_names: ${{ steps.set-repo-names.outputs.repo_names }}
    steps:
      - uses: actions/checkout@v6

      - name: Set repo names
        id: set-repo-names
        env:
          REPOS_FILENAME: repos.json
        run: |
          cat data/repo-names.json | ./bin/matrix_repo_names_json.py > "${REPOS_FILENAME}"
          repo_names="$(jq --compact-output . ${REPOS_FILENAME})"
          jq . <<< "${repo_names}"
          echo "repo_names=${repo_names}" >> ${GITHUB_OUTPUT}


  repo-names:
    needs: [set-repo-names]
    if: ${{ needs.set-repo-names.outputs.repo_names != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include: ${{ fromJSON(needs.set-repo-names.outputs.repo_names) }}
    steps:
      - uses: actions/checkout@v6

      - name: Show matrix
        run:
          echo "${{matrix.repo_name}}"

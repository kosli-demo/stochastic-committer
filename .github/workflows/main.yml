name: Main

on:
  push:
    branches:
      - main
  #schedule: 
  #  - cron: '* * * * *' # Max, every 5 minutes

jobs:
  set-repo-names:
    needs: []
    runs-on: ubuntu-latest
    outputs:
      repo_names: ${{ steps.set-repo-names.outputs.repo_names }}
    steps:
      - uses: actions/checkout@v6

      - name: Set repo names
        id: set-repo-names
        env:
          REPOS_FILENAME: repos.json
        run: |
          URL=https://raw.githubusercontent.com/kosli-demo/base/refs/heads/main/data/all-repos.json
          curl --fail --output all-repos.json --silent "${URL}"
          jq '.[:2]' all-repos.json > "${REPOS_FILENAME}"
          REPO_NAMES="$(jq --compact-output . ${REPOS_FILENAME})"
          jq . <<< "${repo_names}"
          echo "repo_names=${REPO_NAMES}" >> ${GITHUB_OUTPUT}


  repo-names:
    needs: [set-repo-names]
    if: ${{ needs.set-repo-names.outputs.repo_names != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include: ${{ fromJSON(needs.set-repo-names.outputs.repo_names) }}
    env:
      REPO_NAME: ${{ matrix.repo_name }}
    steps:
#      - uses: actions/checkout@v6

      # - name: Clone
      #   env:
      #     GH_TOKEN: ${{ secrets.CLONE_PUSH_REPOS }}
      #   run: |
      #     gh repo create kosli-demo/${REPO_NAME} --public || true
      #     git clone --mirror https://x-access-token:${GH_TOKEN}@github.com/kosli-demo/base.git
      #     cd base.git
      #     git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/kosli-demo/${REPO_NAME}.git
      #     git push --mirror

      - name: Ensure target repo exists
        env:
          GH_TOKEN: ${{ secrets.CLONE_PUSH_REPOS }}
        run:
          gh repo create kosli-demo/${REPO_NAME} --public || true

      - uses: actions/checkout@v6
        with:
          repository: kosli-demo/${{ matrix.repo_name }}
          token: ${{ secrets.CLONE_PUSH_REPOS }}
          fetch-depth: 0
          ref: 'main'

      - name: Make a change
        run: |
          # Force checkout to get most recent commits
          # git pull origin main
          git status
          pwd
          ls -al
          ls -al docs 
          DATE_TIME="$(date +%Y-%m-%dT%H.%M.%S)"
          cat docs/force-ci-run
          echo "${DATE_TIME}" >> docs/force-ci-run
          cat docs/force-ci-run
          #echo "${DATE_TIME}"


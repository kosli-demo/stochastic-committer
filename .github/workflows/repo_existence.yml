name: Ensure repo exists

on:
  workflow_call:
    inputs:
      repo_name:
        description: "Name of repository in kosli_demo Org"
        required: true
        type: string
      repo_exists:
        description: "Whether repo already exists or not"
        required: true
        type: string
    secrets:
      clone_push_repos:
        required: true

env:
  REPO_NAME: ${{ inputs.repo_name }}

jobs:
  repo-does-not-exist:
    if: ${{ inputs.repo_exists == 'false' }}
    runs-on: ubuntu-latest
    steps:
      - name: Clone Repo
        env:
          GH_TOKEN: ${{ secrets.clone_push_repos }}
        run: |
          gh repo create kosli-demo/${REPO_NAME} --public || true
          git clone --mirror https://x-access-token:${GH_TOKEN}@github.com/kosli-demo/base.git
          cd base.git
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/kosli-demo/${REPO_NAME}.git
          git push --mirror

      - uses: ./.github/workflows/repo_change.yml
        with:
          repo_name: ${{ inputs.repo_name }}
        secrets:
          clone_push_repos: ${{ secrets.clone_push_repos }}


  repo-exists:
    if: ${{ inputs.repo_exists == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/workflows/repo_change.yml
        with:
          repo_name: ${{ inputs.repo_name }}
        secrets:
          clone_push_repos: ${{ secrets.clone_push_repos }}

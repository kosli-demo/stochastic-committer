name: Commit to repo

on:
  workflow_call:
    inputs:
      scope:
        type: string
        required: true
      date_time:
        type: string
        required: true
      repo_name:
        type: string
        required: true
    secrets:
      CLONE_PUSH_REPOS:
        required: true
      KOSLI_API_TOKEN_STAGING:
        required: false
      KOSLI_API_TOKEN_PROD:
        required: false

jobs:
  commit-to-repo:
    runs-on: ubuntu-latest
    env:
      DATE_TIME: ${{ inputs.date_time }}
      REPO_NAME: ${{ inputs.repo_name }}
      GH_TOKEN: ${{ secrets.CLONE_PUSH_REPOS }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Configure git
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.event.sender.login }}@users.noreply.github.com"

      - name: Create or commit to repo
        run: |
          if ! gh repo view "kosli-demo/${REPO_NAME}" > /dev/null 2>&1; then
            echo "${REPO_NAME} does not exist"
            gh repo create "kosli-demo/${REPO_NAME}" --public
            for i in $(seq 1 10); do
              if gh repo view "kosli-demo/${REPO_NAME}" > /dev/null 2>&1; then
                break
              fi
              echo "Waiting for repo to be available (attempt ${i}/10)..."
              sleep 10
              if [ "${i}" -eq 10 ]; then
                echo "Repo kosli-demo/${REPO_NAME} not available after 10 attempts"
                exit 1
              fi
            done
            gh repo clone "kosli-demo/base" base-source
            cp -r base-source/. "${REPO_NAME}-init/"
            cd "${REPO_NAME}-init"
            rm -rf .git
            git init --initial-branch main
            git add .
            git commit --message "Initial commit"
            git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/kosli-demo/${REPO_NAME}.git"
            git push --set-upstream origin main
          else
            echo "${REPO_NAME} exists"
            gh repo clone "kosli-demo/${REPO_NAME}"
            mv "${REPO_NAME}"/.git /tmp
            gh repo clone kosli-demo/base
            cd base
            rm -rf .git
            mv /tmp/.git .
            echo "${REPO_NAME} ${DATE_TIME}" > ./source/datetime.txt
            git add .
            git commit --message "Simulated commit ${DATE_TIME}"
            git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/kosli-demo/${REPO_NAME}.git"
            git push
          fi

      - name: Wait for workflow to be available
        run: |
          for i in $(seq 1 10); do
            if gh workflow view main.yml --repo "kosli-demo/${REPO_NAME}" > /dev/null 2>&1; then
              break
            fi
            echo "Waiting for workflow to be available (attempt ${i}/10)..."
            sleep 10
            if [ "${i}" -eq 10 ]; then
              echo "Workflow main.yml not found in kosli-demo/${REPO_NAME} after 10 attempts"
              exit 1
            fi
          done

      - name: Trigger CI workflow in target repo, kosli attest to staging
        if: ${{ inputs.scope == 'staging' || inputs.scope == 'both' }}
        env:
          KOSLI_HOST: https://staging.app.kosli.com
          KOSLI_API_TOKEN: ${{ secrets.KOSLI_API_TOKEN_STAGING }}
        run: |
          BEFORE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          gh workflow run main.yml \
            --repo "kosli-demo/${REPO_NAME}" \
            --ref main \
            --field kosli_host="${KOSLI_HOST}" \
            --field kosli_api_token="${KOSLI_API_TOKEN}"

          for i in $(seq 1 12); do
            RUN_ID=$(gh run list \
              --repo "kosli-demo/${REPO_NAME}" \
              --workflow main.yml \
              --created ">=${BEFORE}" \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId // empty')
            if [ -n "${RUN_ID}" ]; then
              break
            fi
            echo "Waiting for run to appear (attempt ${i}/12)..."
            sleep 5
            if [ "${i}" -eq 12 ]; then
              echo "Run not found after 60 seconds"
              exit 1
            fi
          done

          gh run watch "${RUN_ID}" \
            --repo "kosli-demo/${REPO_NAME}" \
            --exit-status

      - name: Trigger CI workflow in target repo, kosli attest to prod
        if: ${{ inputs.scope == 'prod' || inputs.scope == 'both' }}
        env:
          KOSLI_HOST: https://app.kosli.com
          KOSLI_API_TOKEN: ${{ secrets.KOSLI_API_TOKEN_PROD }}
        run: |
          BEFORE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          gh workflow run main.yml \
            --repo "kosli-demo/${REPO_NAME}" \
            --ref main \
            --field kosli_host="${KOSLI_HOST}" \
            --field kosli_api_token="${KOSLI_API_TOKEN}"

          for i in $(seq 1 12); do
            RUN_ID=$(gh run list \
              --repo "kosli-demo/${REPO_NAME}" \
              --workflow main.yml \
              --created ">=${BEFORE}" \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId // empty')
            if [ -n "${RUN_ID}" ]; then
              break
            fi
            echo "Waiting for run to appear (attempt ${i}/12)..."
            sleep 5
            if [ "${i}" -eq 12 ]; then
              echo "Run not found after 60 seconds"
              exit 1
            fi
          done

          gh run watch "${RUN_ID}" \
            --repo "kosli-demo/${REPO_NAME}" \
            --exit-status

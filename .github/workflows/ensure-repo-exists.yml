name: Ensure repo exists

on:
  workflow_call:
    inputs:
      repo_name:
        type: string
        required: true
    secrets:
      CLONE_PUSH_REPOS:
        required: true

jobs:
  check-and-create:
    runs-on: ubuntu-latest
    env:
      REPO_NAME: ${{ inputs.repo_name }}
      GH_TOKEN: ${{ secrets.CLONE_PUSH_REPOS }}
    outputs:
      was_created: ${{ steps.create.outputs.was_created }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Create repo if it does not exist
        id: create
        run: |
          if ! gh repo view "kosli-demo/${REPO_NAME}" > /dev/null 2>&1; then
            gh repo create "kosli-demo/${REPO_NAME}" --public

            # Wait for repo creation to finish
            for i in $(seq 1 10); do
              if gh repo view "kosli-demo/${REPO_NAME}" > /dev/null 2>&1; then
                break
              fi
              echo "Waiting for repo to be available (attempt ${i}/10)..."
              sleep 10
              if [ "${i}" -eq 10 ]; then
                echo "Repo kosli-demo/${REPO_NAME} not available after 10 attempts"
                exit 1
              fi
            done

            echo "was_created=true" >> "${GITHUB_OUTPUT}"
          else
            echo "was_created=false" >> "${GITHUB_OUTPUT}"
          fi

  initialise:
    needs: [check-and-create]
    if: ${{ needs.check-and-create.outputs.was_created == 'true' }}
    uses: ./.github/workflows/commit-to-repo.yml
    with:
      repo_name: ${{ inputs.repo_name }}
    secrets:
      CLONE_PUSH_REPOS: ${{ secrets.CLONE_PUSH_REPOS }}
